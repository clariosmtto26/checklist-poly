<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Poly</title>
  <style>
    /* Asegura que el contenedor ocupe exactamente el 100% de la pantalla */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f8fafc; /* Color de fondo a juego con la app (slate-50) */
    }
    /* Estilos del iframe para que sea responsivo y sin bordes */
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <!-- REEMPLAZA EL ENLACE DE ABAJO POR LA URL DE TU APLICACIÓN WEB DE GOOGLE APPS SCRIPT -->

</body>
</html>
